<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <!-- Grid pattern -->
    <pattern id="g" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0L0 0 0 50" fill="none" stroke="#161B22" stroke-width="0.6"/>
    </pattern>
    <!-- Scanner beam gradient --> 
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3DDC97" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3DDC97" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#3DDC97" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#3DDC97" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3DDC97" stop-opacity="0"/>
    </linearGradient>
    <!-- Text glow (soft) -->
    <filter id="gf1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text glow (strong – for .AI) -->
    <filter id="gf2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════ BASE ══════════════════════════ -->
  <rect width="900" height="300" fill="#0D1117"/>
  <rect width="900" height="300" fill="url(#g)" opacity="0.55"/>

  <!-- Scanner beam (sweeps top→bottom every 5.5 s) -->
  <rect x="0" y="-60" width="900" height="120" fill="url(#sg)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate"
      from="0,0" to="0,420" dur="5.5s" repeatCount="indefinite"/>
  </rect>

  <!-- ══════════════════════════ FRAME ══════════════════════════ -->
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="300" fill="#3DDC97">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Border lines -->
  <line x1="4" y1="1"   x2="896" y2="1"   stroke="#21262D" stroke-width="1"/>
  <line x1="4" y1="299" x2="896" y2="299" stroke="#21262D" stroke-width="1"/>

  <!-- ══════════════════════════ STATUS BAR ══════════════════════════ -->
  <!-- Blinking status dot -->
  <circle cx="28" cy="32" r="5" fill="#3DDC97">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="4;6.5;4"  dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="41" y="37" font-family="Courier New,Courier,monospace" font-size="11" fill="#3DDC97" letter-spacing="1.5">SYSTEM ONLINE</text>
  <!-- Right status readout -->
  <text x="640" y="37" font-family="Courier New,Courier,monospace" font-size="10" fill="#2D333B" letter-spacing="0.5">PID:2026  MEM:∞  GPU:ACTIVE  MODEL:BUILDING</text>

  <!-- ══════════════════════════ NEURAL NETWORK (top-right) ══════════════════════════ -->
  <!-- Outer pulse ring around hub -->
  <circle cx="820" cy="118" r="20" fill="none" stroke="#3DDC97" stroke-width="0.6">
    <animate attributeName="r"       values="16;25;16" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Hub -->
  <circle cx="820" cy="118" r="5.5" fill="none" stroke="#3DDC97" stroke-width="2">
    <animate attributeName="r"       values="4;8;4"   dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="118" r="2" fill="#3DDC97">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer nodes -->
  <!-- A 762,72 -->
  <circle cx="762" cy="72" r="4" fill="none" stroke="#58A6FF" stroke-width="1.5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- B 835,52 -->
  <circle cx="835" cy="52" r="3.5" fill="#3DDC97">
    <animate attributeName="r"       values="2.5;5;2.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- C 880,108 -->
  <circle cx="880" cy="108" r="4" fill="none" stroke="#3DDC97" stroke-width="1.5">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <!-- D 858,168 -->
  <circle cx="858" cy="168" r="3" fill="#58A6FF">
    <animate attributeName="r"       values="2.5;4.5;2.5" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- E 790,185 -->
  <circle cx="790" cy="185" r="4" fill="none" stroke="#3DDC97" stroke-width="1.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <!-- F 745,125 -->
  <circle cx="745" cy="125" r="3" fill="#58A6FF">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Connections (outer ring) -->
  <g fill="none" stroke-width="0.7">
    <line x1="762" y1="72"  x2="835" y2="52"  stroke="#3DDC97"><animate attributeName="stroke-opacity" values="0.05;0.4;0.05"  dur="2.2s" repeatCount="indefinite"/></line>
    <line x1="835" y1="52"  x2="880" y2="108" stroke="#58A6FF"><animate attributeName="stroke-opacity" values="0.08;0.5;0.08"  dur="2s"   repeatCount="indefinite"/></line>
    <line x1="880" y1="108" x2="858" y2="168" stroke="#3DDC97"><animate attributeName="stroke-opacity" values="0.05;0.4;0.05"  dur="2.7s" repeatCount="indefinite"/></line>
    <line x1="858" y1="168" x2="790" y2="185" stroke="#58A6FF"><animate attributeName="stroke-opacity" values="0.08;0.45;0.08" dur="2.4s" repeatCount="indefinite"/></line>
    <line x1="790" y1="185" x2="745" y2="125" stroke="#3DDC97"><animate attributeName="stroke-opacity" values="0.05;0.35;0.05" dur="3.1s" repeatCount="indefinite"/></line>
    <line x1="745" y1="125" x2="762" y2="72"  stroke="#58A6FF"><animate attributeName="stroke-opacity" values="0.08;0.3;0.08"  dur="2.6s" repeatCount="indefinite"/></line>
    <!-- Spokes to hub -->
    <line x1="762" y1="72"  x2="820" y2="118" stroke="#3DDC97"><animate attributeName="stroke-opacity" values="0.1;0.55;0.1" dur="1.8s" repeatCount="indefinite"/></line>
    <line x1="880" y1="108" x2="820" y2="118" stroke="#3DDC97"><animate attributeName="stroke-opacity" values="0.1;0.5;0.1"  dur="2s"   repeatCount="indefinite"/></line>
    <line x1="858" y1="168" x2="820" y2="118" stroke="#58A6FF"><animate attributeName="stroke-opacity" values="0.1;0.5;0.1"  dur="2.4s" repeatCount="indefinite"/></line>
    <line x1="745" y1="125" x2="820" y2="118" stroke="#58A6FF"><animate attributeName="stroke-opacity" values="0.1;0.4;0.1"  dur="2.6s" repeatCount="indefinite"/></line>
  </g>

  <!-- Signal travelers on connections -->
  <circle r="2.5" fill="#3DDC97"><animateMotion dur="2.2s" repeatCount="indefinite" path="M762,72 L835,52"/><animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle r="2"   fill="#58A6FF"><animateMotion dur="2s"   repeatCount="indefinite" begin="1s"   path="M835,52 L880,108"/><animate attributeName="opacity" values="0;1;0" dur="2s"   repeatCount="indefinite" begin="1s"/></circle>
  <circle r="2"   fill="#3DDC97"><animateMotion dur="2.7s" repeatCount="indefinite" begin="0.6s" path="M880,108 L858,168"/><animate attributeName="opacity" values="0;1;0" dur="2.7s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle r="2"   fill="#3DDC97"><animateMotion dur="1.8s" repeatCount="indefinite" begin="0.9s" path="M745,125 L820,118"/><animate attributeName="opacity" values="0;0.9;0" dur="1.8s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle r="1.5" fill="#58A6FF"><animateMotion dur="2.4s" repeatCount="indefinite" begin="1.2s" path="M820,118 L858,168"/><animate attributeName="opacity" values="0;0.8;0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/></circle>

  <!-- ══════════════════════════ CIRCUIT TRACES (bottom-left) ══════════════════════════ -->
  <g stroke="#3DDC97" stroke-width="0.8" fill="none" opacity="0.1">
    <polyline points="4,240 68,240 68,262 155,262"/>
    <polyline points="4,205 45,205 45,220 100,220"/>
    <circle cx="68"  cy="240" r="2.5" fill="#3DDC97" opacity="1"/>
    <circle cx="45"  cy="205" r="2"   fill="#3DDC97" opacity="1"/>
    <circle cx="155" cy="262" r="1.5" fill="#3DDC97" opacity="1"/>
    <circle cx="100" cy="220" r="1.5" fill="#3DDC97" opacity="1"/>
  </g>
  <!-- Circuit signal dots -->
  <circle r="2" fill="#3DDC97"><animateMotion dur="4.2s" repeatCount="indefinite" path="M4,240 L68,240 L68,262 L155,262"/><animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.05;0.2;0.85;1" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle r="1.5" fill="#3DDC97"><animateMotion dur="3s" repeatCount="indefinite" begin="1.5s" path="M4,205 L45,205 L45,220 L100,220"/><animate attributeName="opacity" values="0;0;0.8;0.8;0" keyTimes="0;0.05;0.2;0.85;1" dur="3s" repeatCount="indefinite" begin="1.5s"/></circle>

  <!-- ══════════════════════════ IDENTITY TEXT ══════════════════════════ -->
  <!-- HANISH (light) -->
  <text x="28" y="178"
    font-family="Courier New,Courier,monospace"
    font-size="76"
    font-weight="900"
    fill="#E6EDF3"
    filter="url(#gf1)">HANISH</text>

  <!-- .AI (signal green, strong glow) -->
  <text x="299" y="178"
    font-family="Courier New,Courier,monospace"
    font-size="76"
    font-weight="900"
    fill="#3DDC97"
    filter="url(#gf2)">.AI</text>

  <!-- Blinking cursor (positioned after .AI) -->
  <rect x="438" y="108" width="13" height="76" fill="#3DDC97">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="28" y="218"
    font-family="Courier New,Courier,monospace"
    font-size="13"
    fill="#7D8590"
    letter-spacing="2.5">EMERGING AI ENGINEER  ·  BUILDING INTELLIGENT SYSTEMS</text>

  <!-- Concept tags row -->
  <text x="28" y="260"
    font-family="Courier New,Courier,monospace"
    font-size="11"
    fill="#3DDC97"
    opacity="0.85"
    letter-spacing="1.2">[ RAG · LLMs · RETRIEVAL · VECTOR_SEARCH · EMBEDDINGS · PYTHON ]</text>

  <!-- Version stamp -->
  <text x="810" y="293" font-family="Courier New,monospace" font-size="9" fill="#2D333B">v2026.1 // MunagalaSaiHanish</text>
</svg>
